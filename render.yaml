services:
  - type: web
    name: gestione-lezioni
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py app:app
    disk:
      name: uploads-disk
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
